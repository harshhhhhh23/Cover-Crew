<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Designs | Cover Crew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #F9F6F1; color: #243B6B; }
        .design-card { transition: all 0.3s ease; border-radius: 2rem; overflow: hidden; background: white; border: 2px solid transparent; }
        .design-card.selected { border-color: #E6B566; transform: scale(0.95); }
        .selection-bar { background: #243B6B; color: white; position: fixed; bottom: 0; width: 100%; padding: 20px; z-index: 100; }
    </style>
</head>
<body class="pb-32">
    <nav class="p-6 flex justify-between items-center gap-4">
        <button onclick="history.back()" class="font-black uppercase text-xs tracking-widest shrink-0">← Back</button>
        
        <h1 id="catTitle" class="font-black uppercase text-2xl tracking-tighter hidden md:block w-full text-center">Collection</h1>
        
        <div class="relative bg-white px-4 py-2 rounded-full border border-navy/10 flex items-center gap-3 shrink-0 shadow-sm">
            <span class="text-[9px] text-[#E6B566] font-bold uppercase block leading-none">Device:</span>
            <select id="deviceSelect" class="bg-transparent font-black text-[10px] uppercase outline-none cursor-pointer text-[#243B6B]">
                <option value="iPhone 15 Pro Max">iPhone 15 Pro Max</option>
                <option value="iPhone 15 Pro">iPhone 15 Pro</option>
                <option value="iPhone 14">iPhone 14</option>
                <option value="Samsung S24 Ultra">Samsung S24 Ultra</option>
                <option value="OnePlus 12">OnePlus 12</option>
                <option value="Google Pixel 8">Google Pixel 8</option>
                <option value="Other Model">Other (Mention on WA)</option>
            </select>
        </div>
    </nav>

    <div class="px-6 grid grid-cols-2 md:grid-cols-4 gap-6 max-w-7xl mx-auto mt-4" id="designGrid">
        </div>

    <div class="selection-bar flex justify-between items-center px-10">
        <div>
            <p class="text-[10px] font-bold uppercase opacity-60">Designs Selected</p>
            <h2 class="text-2xl font-black"><span id="countDisplay">0</span> / 14</h2>
        </div>
        <button id="checkoutBtn" onclick="placeOrder()" class="bg-[#E6B566] text-[#243B6B] px-10 py-4 rounded-full font-black uppercase tracking-widest opacity-50 pointer-events-none transition">Place Order (Select 14)</button>
    </div>

    <script>
        const category = localStorage.getItem('currentCategory') || 'Aesthetic';
        document.getElementById('catTitle').innerText = category;

        let selectedDesigns = [];

        // Mocking 16 designs per category
        const grid = document.getElementById('designGrid');
        for(let i=1; i<=16; i++) {
            grid.innerHTML += `
                <div class="design-card cursor-pointer shadow-sm relative" onclick="toggleSelect(this, '${category} #${i}')">
                    <img src="https://images.unsplash.com/photo-1603313011101-3144fe01a157?w=400&sig=${i}" class="w-full aspect-[2/3] object-cover">
                    <div class="p-4 text-center">
                        <p class="font-black uppercase text-[10px] tracking-widest">${category} Design ${i}</p>
                    </div>
                    <div class="check-mark absolute top-4 right-4 bg-[#E6B566] text-white rounded-full h-6 w-6 flex items-center justify-center opacity-0 transition">✓</div>
                </div>
            `;
        }

        function toggleSelect(el, id) {
            if (selectedDesigns.includes(id)) {
                selectedDesigns = selectedDesigns.filter(item => item !== id);
                el.classList.remove('selected');
                el.querySelector('.check-mark').style.opacity = '0';
            } else {
                if (selectedDesigns.length < 14) {
                    selectedDesigns.push(id);
                    el.classList.add('selected');
                    el.querySelector('.check-mark').style.opacity = '1';
                } else {
                    alert("Bundle limit reached! You have selected 14 designs.");
                }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('countDisplay').innerText = selectedDesigns.length;
            const btn = document.getElementById('checkoutBtn');
            if (selectedDesigns.length === 14) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                btn.innerText = "Order via WhatsApp";
            } else {
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
                btn.innerText = `Select ${14 - selectedDesigns.length} More`;
            }
        }

        function placeOrder() {
            // Get the live device selection right when they click Order
            const finalDevice = document.getElementById('deviceSelect').value;
            const message = `Hi Cover Crew! I want the Buy 1 Get 14 Offer (₹699).%0A%0A*Device:* ${finalDevice}%0A*Selected Designs:*%0A- ${selectedDesigns.join('%0A- ')}%0A%0AOrder Total: ₹699. Ready to pay!`;
            window.location.href = `https://wa.me/917016832677?text=${message}`;
        }
    </script>
</body>
</html>
